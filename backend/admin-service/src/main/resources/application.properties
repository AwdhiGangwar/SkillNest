# ===============================
# SERVER CONFIG
# ===============================
server.port=8086
spring.application.name=ADMIN-SERVICE

# ===============================
# EUREKA CLIENT (if using)
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ===============================
# ACTUATOR (optional but good)
# ===============================
management.endpoints.web.exposure.include=*

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.com.skillnest.admin=DEBUG

# ===============================
# TIMEOUTS (IMPORTANT for microservices)
# ===============================
spring.mvc.async.request-timeout=5000

# ===============================
# REST TEMPLATE TIMEOUT CONFIG
# ===============================
spring.web.client.connect-timeout=5000
spring.web.client.read-timeout=5000

